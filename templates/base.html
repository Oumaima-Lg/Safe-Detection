<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SAFEDETECT{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1419;
            --card: #1a2332;
            --border: #2d3a4d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warn: #d29922;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav a { color: var(--accent); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .flash { padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 6px; }
        .flash.success { background: rgba(63, 185, 80, 0.2); border: 1px solid var(--success); }
        .flash.error { background: rgba(248, 81, 73, 0.2); border: 1px solid var(--danger); }
        .flash.warning { background: rgba(210, 153, 34, 0.2); border: 1px solid var(--warn); }
        .flash.info { background: rgba(88, 166, 255, 0.2); border: 1px solid var(--accent); }
        h1 { font-size: 1.5rem; margin: 0 0 1rem 0; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        input[type="text"], input[type="password"], input[type="url"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
        }
        label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 600; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .badge-success { background: rgba(63, 185, 80, 0.3); color: var(--success); }
        .badge-muted { color: var(--muted); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% if session.get('admin_logged_in') %}
    <nav>
        <span><strong>SAFEDETECT</strong> — Administration</span>
        <span>
            <a href="{{ url_for('dashboard') }}">Tableau de bord</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('logs') }}">Logs</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('captures') }}">Captures</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('logout') }}">Déconnexion</a>
        </span>
    </nav>
    {% endif %}
    <div class="container">
        {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
